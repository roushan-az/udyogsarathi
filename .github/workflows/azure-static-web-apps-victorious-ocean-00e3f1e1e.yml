# .github/workflows/azure-static-web-apps.yml
# Udyog Sarathi — React Frontend CI/CD → Azure Static Web Apps (Free Tier)

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── BUILD & DEPLOY ──────────────────────────────────────────────────────────
  build_and_deploy:
    name: Build and Deploy
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:

      # STEP 0 — Print diagnostic info to help debug token/resource mismatches.
      # The token value is masked (***) but we can see whether it resolved at all.
      - name: Diagnose deployment token
        shell: bash
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          echo "──────────────────────────────────────────────"
          echo "  GitHub run   : $GITHUB_RUN_ID"
          echo "  Repository   : $GITHUB_REPOSITORY"
          echo "  Ref          : $GITHUB_REF"
          echo "  Token set    : $( [ -n "$SWA_TOKEN" ] && echo YES || echo NO ← SECRET MISSING )"
          echo "  Token length : ${#SWA_TOKEN}"
          echo "──────────────────────────────────────────────"
          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN is empty."
            echo "::error::Check GitHub → Settings → Secrets — the name must match exactly."
            exit 1
          fi

      # STEP 1 — Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # STEP 2 — Node 20 + npm cache
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # STEP 3 — Install
      - name: Install dependencies
        run: npm ci

      # STEP 4 — Build  (VITE_* vars baked into the JS bundle here)
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: "https://udyog-sarathi-api-fzfqcwdzepavedd0.centralindia-01.azurewebsites.net/api"
          VITE_USE_MOCK: "false"
          VITE_AZURE_STORAGE_ACCOUNT: "udyogsarathi"
          VITE_AZURE_CONTAINER: "documents"
          VITE_PG_HOST: "udyog-db.postgres.database.azure.com"
          VITE_PG_DB: "udyog_sarathi"

      # STEP 5 — Deploy pre-built dist/ to Azure Static Web Apps
      # skip_app_build: true  → we already built above, Azure must NOT re-build
      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          api_location: ""
          skip_app_build: true

      # STEP 6 — Print the live URL
      - name: Print deployment URL
        if: success()
        run: echo "✅ Deployed → ${{ steps.deploy.outputs.static_web_app_url }}"


  # ── CLOSE PR STAGING ENVIRONMENT ───────────────────────────────────────────
  close_pull_request:
    name: Close PR Staging Environment
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "close"
          app_location: "/"
          output_location: "dist"
          api_location: ""